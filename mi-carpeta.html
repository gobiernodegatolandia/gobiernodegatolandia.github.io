<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carpeta | Gobierno de Gatolandia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gob-blue: #001f3d; --gob-gold: #b8924e; --gob-bg: #f8fafc;
            --white: #ffffff; --success: #10b981; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--gob-bg); color: #1e293b; }

        #loader { position: fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        #content { display: none; grid-template-columns: 280px 1fr; min-height: 100vh; }
        
        aside { background: var(--gob-blue); color: white; padding: 30px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        main { padding: 40px 5%; overflow-y: auto; }

        .id-card { 
            background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            display: flex; gap: 20px; align-items: center;
        }
        .data-item label { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; }
        .data-item span { font-size: 0.9rem; font-weight: 700; color: var(--gob-blue); }

        /* Panel de Empresa */
        .empresa-panel { background: #eff6ff; border: 1px solid #bfdbfe; padding: 25px; border-radius: 20px; margin-top: 20px; }
        .form-empresa { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-top: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        
        .btn-update { background: var(--gob-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .btn-update:hover { background: var(--gob-gold); }

        .section-title { font-size: 1.2rem; color: var(--gob-blue); margin: 30px 0 20px; display: flex; align-items: center; gap: 10px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: auto; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #f1f5f9; color: #64748b; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fa-solid fa-shield-cat fa-spin" style="font-size: 3rem; color: var(--gob-blue);"></i>
        <p style="margin-top: 15px; font-weight: 600;">Sincronizando con el Banco Central...</p>
    </div>

    <div id="content">
        <aside>
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmc--YeQPZVE_Rs3xrp3DhwyCJe9lVXL0LqA&s" width="60">
                <h2 style="font-size: 0.9rem; margin-top: 10px; color: var(--gob-gold);">SEDE ELECTRÓNICA</h2>
            </div>
            <nav id="menu">
                </nav>
            <button class="btn-logout" id="logoutBtn">CERRAR SESIÓN</button>
        </aside>

        <main>
            <h2 class="section-title"><i class="fa-solid fa-id-badge"></i> Perfil Oficial</h2>
            <div class="id-card" id="profile-card">
                <div class="id-details" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; width: 100%;">
                    <div class="data-item"><label>Titular</label><span id="val-nombre">...</span></div>
                    <div class="data-item"><label>Identificación</label><span id="val-dni">...</span></div>
                    <div class="data-item"><label>Entidad/Cargo</label><span id="val-trabajo">...</span></div>
                    <div class="data-item"><label>Renta Anual</label><span id="val-sueldo" style="color: var(--success);">...</span></div>
                </div>
            </div>

            <div id="panel-gestion-empresa" style="display: none;">
                <h2 class="section-title"><i class="fa-solid fa-users-gear"></i> Gestión de Capital Humano</h2>
                <div class="empresa-panel">
                    <p style="font-size: 0.8rem; font-weight: 700; color: var(--gob-blue);">ASIGNAR / EDITAR TRABAJADOR</p>
                    <div class="form-empresa">
                        <input type="text" id="emp-dni" placeholder="DNI del trabajador">
                        <input type="text" id="emp-puesto" placeholder="Cargo">
                        <input type="number" id="emp-sueldo" placeholder="Sueldo (Reales)">
                        <button class="btn-update" id="btnAsignar">ACTUALIZAR FICHA</button>
                    </div>
                </div>

                <h2 class="section-title"><i class="fa-solid fa-list-check"></i> Plantilla Registrada</h2>
                <table id="tabla-empleados">
                    <thead>
                        <tr>
                            <th>Trabajador</th>
                            <th>DNI</th>
                            <th>Cargo</th>
                            <th>Sueldo Anual</th>
                        </tr>
                    </thead>
                    <tbody id="lista-empleados">
                        </tbody>
                </table>
            </div>

            <div id="panel-ciudadano">
                <h2 class="section-title"><i class="fa-solid fa-briefcase"></i> Mi Situación Laboral</h2>
                <div class="id-card">
                    <p id="msg-laboral">Cargando vinculación empresarial...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUBDdTMyQTwQo4FzKpDZDpOAKGPVcki4I",
            authDomain: "sedegatogob.firebaseapp.com",
            projectId: "sedegatogob",
            storageBucket: "sedegatogob.firebasestorage.app",
            messagingSenderId: "764639776502",
            appId: "1:764639776502:web:99f6e1a045f5d4810666d7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const perfil = data.perfil;
                    
                    // Actualizar Ficha Básica
                    document.getElementById('val-nombre').innerText = `${perfil.nombre} ${perfil.apellidos || ''}`;
                    document.getElementById('val-dni').innerText = perfil.dni;
                    document.getElementById('val-trabajo').innerText = perfil.trabajo || "Sin asignar";
                    document.getElementById('val-sueldo').innerText = `${perfil.sueldo || 0} Reales Gatolandeses`;

                    if (perfil.tipo === "empresa") {
                        mostrarPanelEmpresa(perfil.nombre);
                    } else {
                        document.getElementById('panel-ciudadano').style.display = 'block';
                        document.getElementById('msg-laboral').innerText = perfil.empresa ? `Empleado en: ${perfil.empresa}` : "Actualmente no figura vinculación con ninguna empresa.";
                    }
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'grid';
            } else {
                window.location.href = 'index.html';
            }
        });

        // --- LÓGICA DE EMPRESA ---
        async function mostrarPanelEmpresa(nombreEmpresa) {
            document.getElementById('panel-gestion-empresa').style.display = 'block';
            document.getElementById('panel-ciudadano').style.display = 'none';
            
            // Cargar empleados actuales
            const q = query(collection(db, "usuarios"), where("perfil.empresa", "==", nombreEmpresa));
            const querySnapshot = await getDocs(q);
            const tbody = document.getElementById('lista-empleados');
            tbody.innerHTML = "";
            
            querySnapshot.forEach((doc) => {
                const p = doc.data().perfil;
                tbody.innerHTML += `<tr>
                    <td>${p.nombre} ${p.apellidos}</td>
                    <td>${p.dni}</td>
                    <td>${p.trabajo}</td>
                    <td>${p.sueldo} RG</td>
                </tr>`;
            });
        }

        // --- ASIGNAR/EDITAR TRABAJADOR ---
        document.getElementById('btnAsignar').onclick = async () => {
            const dniBusca = document.getElementById('emp-dni').value;
            const nuevoPuesto = document.getElementById('emp-puesto').value;
            const nuevoSueldo = Number(document.getElementById('emp-sueldo').value);
            
            // 1. Buscar al trabajador por DNI
            const q = query(collection(db, "usuarios"), where("perfil.dni", "==", dniBusca));
            const snap = await getDocs(q);

            if (snap.empty) {
                alert("No se encontró ningún ciudadano con ese DNI.");
                return;
            }

            const trabajadorDoc = snap.docs[0];
            const trabajadorUid = trabajadorDoc.id;
            const nombreEmpresa = document.getElementById('val-nombre').innerText;

            // 2. Actualizar su ficha
            await updateDoc(doc(db, "usuarios", trabajadorUid), {
                "perfil.trabajo": nuevoPuesto,
                "perfil.sueldo": nuevoSueldo,
                "perfil.empresa": nombreEmpresa
            });

            alert("Ficha del trabajador actualizada correctamente.");
            location.reload();
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
