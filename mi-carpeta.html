<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sede Electrónica | Reino de Gatolandia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        :root {
            --gob-blue: #001f3d; --gob-gold: #b8924e; --gob-bg: #f8fafc;
            --white: #ffffff; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--gob-bg); color: #1e293b; }

        /* Estructura Base */
        #loader { position: fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        #content { display: none; grid-template-columns: 280px 1fr; min-height: 100vh; }
        aside { background: var(--gob-blue); color: white; padding: 30px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        main { padding: 40px 5%; overflow-y: auto; }

        /* Componentes UI */
        .card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .section-title { font-size: 1.1rem; color: var(--gob-blue); margin: 35px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Grid de Datos */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; }
        .data-item label { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; }
        .data-item span { font-size: 0.95rem; font-weight: 700; color: var(--gob-blue); }

        /* Tablas y Formularios */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { background: #f1f5f9; text-align: left; padding: 12px; font-size: 0.65rem; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .form-row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; flex: 1; min-width: 150px; }

        /* Botones y Varios */
        .btn-primary { background: var(--gob-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: auto; }
    </style>
</head>
<body>

    <div id="loader"><i class="fa-solid fa-shield-cat fa-spin" style="font-size: 3rem; color: var(--gob-blue);"></i></div>

    <div id="content">
        <aside>
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmc--YeQPZVE_Rs3xrp3DhwyCJe9lVXL0LqA&s" width="55">
                <h2 style="font-size: 0.8rem; margin-top: 10px; color: var(--gob-gold);">REINO DE GATOLANDIA</h2>
            </div>
            <div id="nav-user-info" style="font-size: 0.7rem; margin-bottom: 20px; opacity: 0.8;"></div>
            <button class="btn-logout" id="logoutBtn">CERRAR SESIÓN</button>
        </aside>

        <main id="app-viewport">
            <section id="mod-identidad"></section>

            <section id="mod-rol-especifico"></section>

            <section id="mod-tramites"></section>

            <section id="mod-catalogo"></section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUBDdTMyQTwQo4FzKpDZDpOAKGPVcki4I",
            authDomain: "sedegatogob.firebaseapp.com",
            projectId: "sedegatogob",
            storageBucket: "sedegatogob.firebasestorage.app",
            messagingSenderId: "764639776502",
            appId: "1:764639776502:web:99f6e1a045f5d4810666d7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MOTOR DEL SISTEMA ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    inicializarModulos(userData, user.uid);
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'grid';
            } else {
                window.location.href = 'index.html';
            }
        });

        function inicializarModulos(data, uid) {
            renderIdentidad(data.perfil);
            renderTramites(data.tramites);
            renderCatalogo();
            
            // Inyección condicional de módulo de ROL
            if (data.perfil.tipo === 'empresa') {
                renderModuloEmpresa(data.perfil.nombre);
            } else {
                renderModuloCiudadano(data.perfil.empresa);
            }
            document.getElementById('nav-user-info').innerText = data.perfil.dni;
        }

        // --- MODULO: IDENTIDAD ---
        function renderIdentidad(p) {
            document.getElementById('mod-identidad').innerHTML = `
                <h2 class="section-title"><i class="fa-solid fa-id-card"></i> Identidad Digital</h2>
                <div class="card">
                    <div class="data-grid">
                        <div class="data-item"><label>Titular</label><span>${p.nombre} ${p.apellidos || ''}</span></div>
                        <div class="data-item"><label>ID Oficial</label><span>${p.dni}</span></div>
                        <div class="data-item"><label>Actividad</label><span>${p.trabajo || 'N/A'}</span></div>
                        <div class="data-item"><label>Renta Anual</label><span style="color:var(--success)">${p.sueldo || 0} Reales Gatolandeses</span></div>
                    </div>
                </div>`;
        }

        // --- MODULO: EMPRESA ---
        async function renderModuloEmpresa(nombreEmpresa) {
            const container = document.getElementById('mod-rol-especifico');
            container.innerHTML = `
                <h2 class="section-title"><i class="fa-solid fa-users-gear"></i> Gestión de Personal</h2>
                <div class="card" style="background:#f0f7ff">
                    <div class="form-row">
                        <input type="text" id="inp-dni" placeholder="DNI del trabajador">
                        <input type="text" id="inp-puesto" placeholder="Cargo">
                        <input type="number" id="inp-sueldo" placeholder="Sueldo (RG)">
                        <button class="btn-primary" id="btn-actualizar-emp">ACTUALIZAR</button>
                    </div>
                    <table id="tabla-nomina">
                        <thead><tr><th>Nombre</th><th>DNI</th><th>Cargo</th><th>Sueldo</th></tr></thead>
                        <tbody id="lista-empleados-body"></tbody>
                    </table>
                </div>`;

            // Lógica interna del módulo empresa
            const q = query(collection(db, "usuarios"), where("perfil.empresa", "==", nombreEmpresa));
            const snap = await getDocs(q);
            const body = document.getElementById('lista-empleados-body');
            snap.forEach(doc => {
                const emp = doc.data().perfil;
                body.innerHTML += `<tr><td>${emp.nombre}</td><td>${emp.dni}</td><td>${emp.trabajo}</td><td>${emp.sueldo} RG</td></tr>`;
            });

            document.getElementById('btn-actualizar-emp').onclick = async () => {
                const dni = document.getElementById('inp-dni').value;
                const qUser = query(collection(db, "usuarios"), where("perfil.dni", "==", dni));
                const res = await getDocs(qUser);
                if(!res.empty) {
                    await updateDoc(doc(db, "usuarios", res.docs[0].id), {
                        "perfil.trabajo": document.getElementById('inp-puesto').value,
                        "perfil.sueldo": Number(document.getElementById('inp-sueldo').value),
                        "perfil.empresa": nombreEmpresa
                    });
                    location.reload();
                }
            };
        }

        // --- MODULO: CIUDADANO ---
        function renderModuloCiudadano(empresa) {
            document.getElementById('mod-rol-especifico').innerHTML = `
                <h2 class="section-title"><i class="fa-solid fa-briefcase"></i> Situación Laboral</h2>
                <div class="card">
                    <p style="font-weight:700">${empresa ? 'TRABAJANDO EN: ' + empresa.toUpperCase() : 'BUSCANDO EMPLEO / AUTÓNOMO'}</p>
                </div>`;
        }

        // --- MODULO: TRÁMITES ---
        function renderTramites(tramites) {
            const container = document.getElementById('mod-tramites');
            let html = `<h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Mis Expedientes</h2><div class="data-grid">`;
            
            if (tramites && Object.keys(tramites).length > 0) {
                Object.values(tramites).forEach(t => {
                    html += `<div class="card" style="margin-bottom:0; border-left:5px solid ${t.estado==='completado'?'var(--success)':'var(--warning)'}">
                        <small>${t.estado.toUpperCase()}</small>
                        <p style="font-weight:800; margin:5px 0;">${t.nombre}</p>
                        <small style="opacity:0.6">${t.fecha}</small>
                    </div>`;
                });
            } else {
                html += `<p style="grid-column: span 3; opacity:0.5">No hay expedientes registrados.</p>`;
            }
            container.innerHTML = html + `</div>`;
        }

        // --- MODULO: CATÁLOGO ---
        function renderCatalogo() {
            document.getElementById('mod-catalogo').innerHTML = `
                <h2 class="section-title"><i class="fa-solid fa-boxes-stacked"></i> Catálogo de Trámites</h2>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
                    <a href="/hacienda/renta"><div class="card" style="text-align:center; cursor:pointer;"><i class="fa-solid fa-coins"></i><br><small>Declaración de la Renta</small></div></a>                    <div class="card" style="text-align:center; cursor:pointer;"><i class="fa-solid fa-house"></i><br><small>Padrón</small></div>
                    <div class="card" style="text-align:center; cursor:pointer;"><i class="fa-solid fa-medkit"></i><br><small>Salud</small></div>
                    <div class="card" style="text-align:center; cursor:pointer;"><i class="fa-solid fa-building"></i><br><small>Empresas</small></div>
                </div>`;
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

    </script>
</body>
</html>
