<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sede Electrónica | Carpeta Ciudadana Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gob-blue: #001f3d;
            --gob-gold: #b8924e;
            --gob-bg: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--gob-bg);
            color: #1e293b;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- SIDEBAR MODULAR --- */
        aside {
            width: var(--sidebar-width);
            background: var(--gob-blue);
            color: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 4px solid var(--gob-gold);
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            color: #cbd5e1;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 700;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        /* --- ÁREA PRINCIPAL --- */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* BUSCADOR PRO */
        .search-box {
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #e2e8f0;
            width: 400px;
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        /* SECCIONES SPA */
        .page-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
            }
        }

        /* TARJETAS Y GRID */
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            margin-bottom: 25px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* BOTONES DE TRÁMITES */
        .btn-tramite {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-tramite:hover {
            border-color: var(--gob-gold);
            background: #fffcf5;
            transform: translateY(-3px);
        }

        .btn-tramite i {
            font-size: 1.5rem;
            color: var(--gob-blue);
        }

        /* ESTADOS */
        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .bg-pendiente {
            background: #fef3c7;
            color: #d97706;
        }

        .bg-completado {
            background: #dcfce7;
            color: #059669;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .toast {
            background: white;
            color: var(--gob-blue);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid var(--gob-gold);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.info {
            border-left-color: var(--gob-blue);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <i class="fa-solid fa-cat fa-bounce" style="font-size: 3rem; color: var(--gob-blue);"></i>
        <p style="margin-top: 15px; font-weight: 700;">ACCEDIENDO A GATOLANDIA...</p>
    </div>

    <aside>
        <div style="text-align: center; margin-bottom: 40px;">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmc--YeQPZVE_Rs3xrp3DhwyCJe9lVXL0LqA&s" width="60" style="filter: brightness(1.2);">
            <h1 style="font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px; color: var(--gob-gold);">CARPETA CIUDADANA</h1>
        </div>

        <nav id="sidebar-nav">
            <div class="nav-item active" onclick="SedeGato.switchTab('inicio', this)"><i class="fa-solid fa-house"></i> Inicio</div>
            <div class="nav-item" onclick="SedeGato.switchTab('tramites', this)"><i class="fa-solid fa-list-check"></i> Trámites Disponibles</div>
            <div class="nav-item" onclick="SedeGato.switchTab('expedientes', this)"><i class="fa-solid fa-box-archive"></i> Mis Expedientes</div>
            <div class="nav-item" onclick="SedeGato.switchTab('perfil', this)"><i class="fa-solid fa-id-card"></i> Datos Oficiales</div>
        </nav>

        <div id="user-pill" style="margin-top: auto; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 0.8rem;">
            <p id="nav-dni" style="font-weight: 800; color: var(--gob-gold);"></p>
            <p id="nav-nombre" style="opacity: 0.7;"></p>
            <button onclick="SedeGato.logout()" style="background: none; border: none; color: #ef4444; font-weight: 700; cursor: pointer; margin-top: 10px;">Cerrar Sesión</button>
        </div>
    </aside>

    <main>
        <div class="header-bar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="globalSearch" placeholder="Buscar trámite, expediente o documento..." onkeyup="SedeGato.filterContent()">
            </div>
            <div id="notif-bell" style="position: relative; cursor: pointer;">
                <i class="fa-solid fa-bell" style="font-size: 1.2rem;"></i>
                <span id="notif-count" style="position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; display: none;">0</span>
            </div>
        </div>

        <!-- SECCIÓN: INICIO -->
        <div id="sec-inicio" class="page-section active">
            <h2 style="margin-bottom: 25px;">Bienvenido a su área personal</h2>
            <div class="grid-3">
                <div class="card" style="border-top: 4px solid var(--gob-gold);">
                    <label style="font-size: 0.7rem; font-weight: 800; color: #64748b;">MI IDENTIDAD</label>
                    <div id="identidad-resumen" style="margin-top: 15px;"></div>
                </div>
                <div class="card" style="border-top: 4px solid var(--success);">
                    <label style="font-size: 0.7rem; font-weight: 800; color: #64748b;">ESTADO DE TRÁMITES</label>
                    <div id="tramites-resumen" style="margin-top: 15px;"></div>
                </div>
            </div>
            <h3 style="margin: 20px 0;">Trámites más frecuentes</h3>
            <div class="grid-3" id="quick-actions"></div>
        </div>

        <!-- SECCIÓN: TRÁMITES (CATÁLOGO) -->
        <div id="sec-tramites" class="page-section">
            <h2 style="margin-bottom: 25px;">Catálogo de Procedimientos</h2>
            <div class="grid-3" id="full-catalogo"></div>
        </div>

        <!-- SECCIÓN: EXPEDIENTES -->
        <div id="sec-expedientes" class="page-section">
            <h2 style="margin-bottom: 25px;">Mis Expedientes</h2>
            <div class="card" style="padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                        <tr>
                            <th style="padding: 15px; text-align: left; font-size: 0.7rem; color: #64748b;">FECHA</th>
                            <th style="padding: 15px; text-align: left; font-size: 0.7rem; color: #64748b;">PROCEDIMIENTO</th>
                            <th style="padding: 15px; text-align: left; font-size: 0.7rem; color: #64748b;">ESTADO</th>
                            <th style="padding: 15px; text-align: right; font-size: 0.7rem; color: #64748b;">ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody id="lista-expedientes"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN: PERFIL -->
        <div id="sec-perfil" class="page-section">
            <h2 style="margin-bottom: 25px;">Configuración de Datos</h2>
            <div class="card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div><label>Nombre</label><input type="text" id="inp-nombre" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                    <div><label>Apellidos</label><input type="text" id="inp-apellidos" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                </div>
                <button onclick="SedeGato.updateUser()" class="card" style="background: var(--gob-blue); color: white; border: none; padding: 15px 30px; cursor: pointer; width: auto;">GUARDAR CAMBIOS OFICIALES</button>
            </div>
        </div>
    </main>

    <script type="module">
        import {
            initializeApp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            getDoc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUBDdTMyQTwQo4FzKpDZDpOAKGPVcki4I",
            authDomain: "sedegatogob.firebaseapp.com",
            projectId: "sedegatogob",
            storageBucket: "sedegatogob.firebasestorage.app",
            messagingSenderId: "764639776502",
            appId: "1:764639776502:web:99f6e1a045f5d4810666d7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MÓDULO MAESTRO: SEDEGATO ---
        window.SedeGato = {
            user: null,
            uid: null,
            catalog: [{
                    id: 'REN',
                    nombre: 'Declaración de la Renta',
                    icon: 'fa-coins',
                    cat: 'Hacienda',
                    url: 'https://hacienda.gatolandia.gob/renta'
                },
                {
                    id: 'PAD',
                    nombre: 'Certificado de Empadronamiento',
                    icon: 'fa-file-signature',
                    cat: 'Padrón',
                    url: '/tramites/padron-online'
                },
                // Si no tiene 'url', simplemente iniciará el trámite en el panel
            ],

            init: function() {
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        this.uid = u.uid;
                        const docSnap = await getDoc(doc(db, "usuarios", u.uid));
                        if (docSnap.exists()) {
                            this.user = docSnap.data();
                            if (this.user.perfil.tipo === 'empresa') window.location.href = 'empresas';
                            this.render();
                            document.getElementById('loader').style.display = 'none';
                        }
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            },

            render: function() {
                const {
                    perfil,
                    tramites = {}
                } = this.user;

                // Sidebar e Identidad
                document.getElementById('nav-dni').innerText = perfil.dni;
                document.getElementById('nav-nombre').innerText = `${perfil.nombre} ${perfil.apellidos || ''}`;
                document.getElementById('inp-nombre').value = perfil.nombre;
                document.getElementById('inp-apellidos').value = perfil.apellidos || '';

                document.getElementById('identidad-resumen').innerHTML = `
                    <p style="font-size:1.2rem; font-weight:800;">${perfil.nombre}</p>
                    <p style="opacity:0.6;">DNI: ${perfil.dni}</p>
                `;

                // Render Catálogos
                this.renderCatalogo();
                this.renderExpedientes();
                this.updateNotifs();
            },

            renderCatalogo: function() {
                const containerFull = document.getElementById('full-catalogo');
                const containerQuick = document.getElementById('quick-actions');
                containerFull.innerHTML = '';
                containerQuick.innerHTML = '';

                this.catalog.forEach(item => {
                    const html = `
                        <div class="btn-tramite" onclick="SedeGato.addTramite('${item.nombre}')">
                            <i class="fa-solid ${item.icon}"></i>
                            <div>
                                <p style="font-weight:800; font-size:0.9rem;">${item.nombre}</p>
                                <small style="color:var(--gob-gold)">${item.cat}</small>
                            </div>
                        </div>`;
                    containerFull.innerHTML += html;
                    if (containerQuick.children.length < 3) containerQuick.innerHTML += html;
                });
            },

            renderExpedientes: function() {
                const tbody = document.getElementById('lista-expedientes');
                const tramites = this.user.tramites || {};
                tbody.innerHTML = '';

                Object.entries(tramites).forEach(([id, t]) => {
                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid #f1f5f9;">
                            <td style="padding:15px; font-size:0.85rem;">${t.fecha}</td>
                            <td style="padding:15px; font-weight:700;">${t.nombre}</td>
                            <td style="padding:15px;"><span class="badge bg-${t.estado}">${t.estado}</span></td>
<td style="padding:15px; text-align:right;">
    <i class="fa-solid fa-circle-chevron-right" style="color:#cbd5e1"></i>
</td>
                        </tr>`;
                });
            },

            addTramite: async function(nombre) {
                // Buscamos si el trámite tiene una URL definida
                const info = this.catalog.find(c => c.nombre === nombre);

                const id = "EXP-" + Date.now();
                await updateDoc(doc(db, "usuarios", this.uid), {
                    [`tramites.${id}`]: {
                        nombre,
                        fecha: new Date().toLocaleDateString(),
                        estado: 'pendiente'
                    }
                });

                if (info && info.url) {
                    this.showToast(`Redirigiendo a sede externa...`, 'info');
                    setTimeout(() => window.open(info.url, '_blank'), 1500);
                } else {
                    this.showToast(`Trámite ${nombre} iniciado correctamente`, 'success');
                }
                this.render(); // Recarga visual sin F5
            },

            simularAprobacion: async function(id) {
                await updateDoc(doc(db, "usuarios", this.uid), {
                    [`tramites.${id}.estado`]: 'completado'
                });
                location.reload();
            },

            updateUser: async function() {
                await updateDoc(doc(db, "usuarios", this.uid), {
                    "perfil.nombre": document.getElementById('inp-nombre').value,
                    "perfil.apellidos": document.getElementById('inp-apellidos').value
                });
                this.showToast("DATOS ACTUALIZADOS");
                location.reload();
            },

            switchTab: function(tabId, el) {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById('sec-' + tabId).classList.add('active');
                el.classList.add('active');
            },

            filterContent: function() {
                const query = document.getElementById('globalSearch').value.toLowerCase();
                document.querySelectorAll('.btn-tramite').forEach(btn => {
                    const text = btn.innerText.toLowerCase();
                    btn.style.display = text.includes(query) ? 'flex' : 'none';
                });
            },

            updateNotifs: function() {
                const pend = Object.values(this.user.tramites || {}).filter(t => t.estado === 'pendiente').length;
                const badge = document.getElementById('notif-count');
                if (pend > 0) {
                    badge.innerText = pend;
                    badge.style.display = 'block';
                }
            },

            logout: () => signOut(auth)
        };
        showToast: function(mensaje, tipo = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${tipo}`;
                toast.innerHTML = `
        <i class="fa-solid ${tipo === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i>
        <span>${mensaje}</span>
    `;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            },
            SedeGato.init();
    </script>
    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000;"></div>
</body>

</html>
