<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carpeta Ciudadana | Reino de Gatolandia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gob-blue: #001f3d;
            --gob-gold: #b8924e;
            --gob-bg: #f8fafc;
            --white: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--gob-bg); color: #1e293b; display: none; }

        /* --- LAYOUT --- */
        .layout { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        
        /* --- ASIDE (MENÚ) --- */
        aside { background: var(--gob-blue); color: white; padding: 30px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .aside-header { padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .aside-header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: var(--gob-gold); }
        
        nav ul { list-style: none; flex-grow: 1; }
        nav li { padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        nav li:hover, nav li.active { background: rgba(255,255,255,0.1); color: var(--gob-gold); }

        /* --- FICHA DE IDENTIDAD --- */
        .id-card { 
            background: linear-gradient(135deg, var(--white) 0%, #f1f5f9 100%); 
            padding: 25px; border-radius: 20px; margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0; display: flex; gap: 25px; align-items: center;
        }
        .avatar-circle { width: 80px; height: 80px; background: var(--gob-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gob-gold); font-size: 2rem; border: 4px solid var(--white); }
        .id-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; flex-grow: 1; }
        .data-item { display: flex; flex-direction: column; }
        .data-item label { font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .data-item span { font-size: 0.95rem; font-weight: 700; color: var(--gob-blue); }

        /* --- MAIN CONTENT --- */
        main { padding: 40px 5%; overflow-y: auto; }
        .section-title { font-size: 1.4rem; color: var(--gob-blue); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        /* --- TRÁMITES EN CURSO --- */
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .status-card { background: white; padding: 20px; border-radius: 16px; border-left: 6px solid var(--warning); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .status-card.completed { border-left-color: var(--success); }
        .badge { font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-success { background: #d1fae5; color: #065f46; }

        /* --- CATÁLOGO --- */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .catalog-item { background: white; padding: 20px; border-radius: 12px; text-decoration: none; color: inherit; border: 1px solid #e2e8f0; transition: 0.2s; }
        .catalog-item:hover { border-color: var(--gob-gold); transform: translateY(-3px); }
        .catalog-item i { color: var(--gob-gold); margin-bottom: 10px; font-size: 1.2rem; }
        .catalog-item h5 { font-size: 0.85rem; color: var(--gob-blue); }

        .btn-logout { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: auto; }
    </style>
</head>
<body>

    <div id="loader" style="position: fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
        <i class="fa-solid fa-shield-cat fa-beat" style="font-size: 3rem; color: var(--gob-blue);"></i>
        <p style="margin-top: 20px; font-weight: 600;">Accediendo al Archivo Nacional...</p>
    </div>

    <div class="layout" id="content">
        <aside>
            <div class="aside-header">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmc--YeQPZVE_Rs3xrp3DhwyCJe9lVXL0LqA&s" width="40">
                <h1>REINO DE GATOLANDIA</h1>
            </div>
            <nav>
                <ul>
                    <li class="active"><i class="fa-solid fa-user-shield"></i> Perfil Ciudadano</li>
                    <li><i class="fa-solid fa-file-invoice-dollar"></i> Mis Impuestos</li>
                    <li><i class="fa-solid fa-briefcase"></i> Vida Laboral</li>
                    <li><i class="fa-solid fa-hospital-user"></i> Salud</li>
                    <li><i class="fa-solid fa-bell"></i> Notificaciones</li>
                </ul>
            </nav>
            <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-power-off"></i> CERRAR SESIÓN</button>
        </aside>

        <main>
            <h2 class="section-title"><i class="fa-solid fa-id-card"></i> Identidad Digital Oficial</h2>
            <div class="id-card" id="profile-card">
                <div class="avatar-circle"><i class="fa-solid fa-cat"></i></div>
                <div class="id-details" id="perfil-datos">
                    <div class="data-item"><label>Nombre</label><span id="db-nombre">...</span></div>
                    <div class="data-item"><label>DNI/NIE</label><span id="db-dni">...</span></div>
                    <div class="data-item"><label>Situación</label><span id="db-trabajo">...</span></div>
                    <div class="data-item"><label>Ingresos Anuales</label><span id="db-sueldo">...</span></div>
                    <div class="data-item"><label>Dirección</label><span id="db-direccion">...</span></div>
                    <div class="data-item"><label>Tipo Sujeto</label><span id="db-tipo" style="color:var(--gob-gold)">...</span></div>
                </div>
            </div>

            <h2 class="section-title"><i class="fa-solid fa-spinner"></i> Trámites y Expedientes</h2>
            <div class="status-grid" id="expedientes-lista">
                </div>

            <h2 class="section-title"><i class="fa-solid fa-magnifying-glass"></i> Iniciar Nuevo Trámite</h2>
            <div class="catalog-grid" id="catalogo">
                </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUBDdTMyQTwQo4FzKpDZDpOAKGPVcki4I",
            authDomain: "sedegatogob.firebaseapp.com",
            projectId: "sedegatogob",
            storageBucket: "sedegatogob.firebasestorage.app",
            messagingSenderId: "764639776502",
            appId: "1:764639776502:web:99f6e1a045f5d4810666d7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CATÁLOGO DE TRÁMITES (ESTRUCTURA DE ESTADO)
        const tramitesMaster = [
            { n: "Declaración de la Renta 2026", m: "hacienda", u: "renta", icon: "fa-coins" },
            { n: "Certificado de Empadronamiento", m: "interior", u: "padron", icon: "fa-house" },
            { n: "Solicitud de Beca Universitaria", m: "educacion", u: "beca", icon: "fa-graduation-cap" },
            { n: "Vida Laboral", m: "empleo", u: "vida-laboral", icon: "fa-briefcase" },
            { n: "Cita Médica Especialista", m: "salud", u: "cita", icon: "fa-stethoscope" },
            { n: "Registro de Marca / Empresa", m: "industria", u: "registro", icon: "fa-building" }
        ];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ESCUCHA EN TIEMPO REAL DE FIRESTORE
                onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        updateUI(data);
                    } else {
                        console.error("No existe el perfil en la base de datos de ciudadanos.");
                    }
                    document.getElementById('loader').style.display = 'none';
                    document.body.style.display = 'block';
                });
            } else {
                window.location.href = 'index.html';
            }
        });

        function updateUI(data) {
            // 1. Datos de Perfil
            document.getElementById('db-nombre').innerText = data.perfil.nombre + " " + data.perfil.apellidos;
            document.getElementById('db-dni').innerText = data.perfil.dni;
            document.getElementById('db-trabajo').innerText = data.perfil.trabajo;
            document.getElementById('db-sueldo').innerText = data.perfil.sueldo + " Gatosuros";
            document.getElementById('db-direccion').innerText = data.perfil.direccion;
            document.getElementById('db-tipo').innerText = data.perfil.tipo.toUpperCase();

            // 2. Expedientes (Trámites realizados)
            const listaExp = document.getElementById('expedientes-lista');
            listaExp.innerHTML = "";
            
            if (data.tramites && Object.keys(data.tramites).length > 0) {
                Object.values(data.tramites).forEach(t => {
                    const isComp = t.estado === 'completado';
                    listaExp.innerHTML += `
                        <div class="status-card ${isComp ? 'completed' : ''}">
                            <span class="badge ${isComp ? 'badge-success' : 'badge-pending'}">
                                ${t.estado.toUpperCase()}
                            </span>
                            <h4>${t.nombre}</h4>
                            <p style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">
                                <i class="fa-solid fa-building-columns"></i> Min. de ${t.ministerio} | ${t.fecha}
                            </p>
                        </div>
                    `;
                });
            } else {
                listaExp.innerHTML = "<p style='color:#64748b'>No hay trámites iniciados.</p>";
            }

            // 3. Catálogo de Trámites
            const catalogo = document.getElementById('catalogo');
            catalogo.innerHTML = "";
            tramitesMaster.forEach(t => {
                catalogo.innerHTML += `
                    <a href="https://gobiernodegatolandia.github.io/${t.m}/${t.u}" class="catalog-item">
                        <i class="fa-solid ${t.icon}"></i>
                        <h5>${t.n}</h5>
                        <p style="font-size:0.6rem; color:#94a3b8; text-transform:uppercase; margin-top:5px;">${t.m}</p>
                    </a>
                `;
            });
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

    </script>
</body>
</html>
