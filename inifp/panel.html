<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAE - Sistema de Identificación y Alta de Expedientes | INIFP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --inifp-dark: #001529;
            --inifp-accent: #d4af37;
            --danger: #c62828;
            --success: #2e7d32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Source Sans 3', sans-serif; 
            background-color: #eef2f5; 
            color: #1a1a1a; 
            display: none; /* Seguridad: Solo se muestra si es funcionario */
        }

        /* --- CABECERA GUBERNAMENTAL --- */
        header { 
            background: var(--inifp-dark); 
            color: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid var(--inifp-accent);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area h1 { font-size: 1.1rem; letter-spacing: 2px; font-weight: 900; }

        /* --- FORMULARIO DE ALTA --- */
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .office-card { 
            background: white; 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 5px solid var(--inifp-dark);
        }
        
        .header-form { border-bottom: 1px solid #ddd; margin-bottom: 30px; padding-bottom: 20px; }
        .header-form h2 { font-size: 1.5rem; color: var(--inifp-dark); text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            background: #fafafa;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--inifp-accent); outline: none; background: white; }

        .btn-register { 
            background: var(--inifp-dark); 
            color: white; 
            padding: 18px; 
            border: none; 
            width: 100%; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-register:hover { background: #002b52; }

        #status-msg { 
            margin-top: 25px; 
            padding: 15px; 
            font-weight: 700; 
            text-align: center; 
            display: none; 
            border: 1px solid transparent;
        }
        .msg-ok { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .msg-err { background: #ffebee; color: var(--danger); border-color: var(--danger); }

        .footer-note { text-align: center; margin-top: 30px; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <i class="fa-solid fa-building-shield" style="color: var(--inifp-accent); font-size: 1.5rem;"></i>
            <h1>INIFP <span style="font-weight: 300; color: #aaa;">| GOBIERNO DE GATOLANDIA</span></h1>
        </div>
        <div id="func-info" style="font-size: 0.7rem; font-family: 'Roboto Mono';">
            AUTENTICANDO FUNCIONARIO...
        </div>
    </header>

    <div class="container">
        <div class="office-card">
            <div class="header-form">
                <h2>Emisión de Identidad Fiscal y Personal</h2>
                <p style="font-size: 0.8rem; color: #777;">Registro oficial en el Pasaporte Digital del Reino.</p>
            </div>

            <div class="grid">
                <div class="field full">
                    <label><i class="fa-solid fa-key"></i> UID de Firebase (Identificador Único del Ciudadano)</label>
                    <input type="text" id="uid" placeholder="uR7x9Wz..." required>
                </div>

                <div class="field">
                    <label>Nombre(s)</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="field">
                    <label>Apellidos</label>
                    <input type="text" id="apellidos" required>
                </div>

                <div class="field">
                    <label>DNI / NIE / CIF</label>
                    <input type="text" id="dni" placeholder="00000000X" required>
                </div>
                <div class="field">
                    <label>Tipo de Entidad</label>
                    <select id="tipo">
                        <option value="ciudadano">Ciudadano</option>
                        <option value="empresa">Empresa / Entidad Jurídica</option>
                        <option value="inifp">Funcionario INIFP</option>
                    </select>
                </div>

                <div class="field">
                    <label>Profesión / Actividad</label>
                    <input type="text" id="trabajo" placeholder="Ej: Analista de Datos">
                </div>
                <div class="field">
                    <label>Sueldo Base Anual (G)</label>
                    <input type="number" id="sueldo" placeholder="0.00">
                </div>

                <div class="field full">
                    <label>Dirección Fiscal / Residencia</label>
                    <input type="text" id="direccion" placeholder="Calle, Número, Piso, Ciudad">
                </div>
            </div>

            <button class="btn-register" id="btnEmitir">
                <i class="fa-solid fa-file-signature"></i> Firmar y Emitir Identidad
            </button>

            <div id="status-msg"></div>
        </div>
        
        <p class="footer-note">El uso no autorizado de este sistema está penado por el Código Penal de Gatolandia.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUBDdTMyQTwQo4FzKpDZDpOAKGPVcki4I",
            authDomain: "sedegatogob.firebaseapp.com",
            projectId: "sedegatogob",
            storageBucket: "sedegatogob.firebasestorage.app",
            messagingSenderId: "764639776502",
            appId: "1:764639776502:web:99f6e1a045f5d4810666d7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONTROL DE ACCESO ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().perfil.tipo === "inifp") {
                    document.body.style.display = 'block';
                    document.getElementById('func-info').innerText = "FUNCIONARIO ID: " + user.uid.substring(0,8).toUpperCase();
                } else {
                    alert("ACCESO RESTRINGIDO: Solo personal del INIFP.");
                    window.location.href = "../mi-carpeta.html";
                }
            } else {
                window.location.href = "../index.html";
            }
        });

        // --- EMISIÓN DE DATOS ---
        document.getElementById('btnEmitir').onclick = async () => {
            const btn = document.getElementById('btnEmitir');
            const uid = document.getElementById('uid').value.trim();
            const msg = document.getElementById('status-msg');

            if(!uid) { alert("UID de ciudadano requerido"); return; }

            btn.disabled = true;
            btn.innerText = "PROCESANDO FIRMA DIGITAL...";

            const payload = {
                perfil: {
                    nombre: document.getElementById('nombre').value,
                    apellidos: document.getElementById('apellidos').value,
                    dni: document.getElementById('dni').value,
                    tipo: document.getElementById('tipo').value,
                    trabajo: document.getElementById('trabajo').value,
                    sueldo: Number(document.getElementById('sueldo').value),
                    direccion: document.getElementById('direccion').value
                },
                tramites: {} // Historial vacío para empezar
            };

            try {
                await setDoc(doc(db, "usuarios", uid), payload);
                
                msg.innerText = "IDENTIDAD EMITIDA: El ciudadano ya puede acceder a su Carpeta.";
                msg.className = "msg-ok";
                msg.style.display = "block";
                
                // Limpiar formulario
                document.querySelectorAll('input').forEach(i => i.value = "");
            } catch (error) {
                msg.innerText = "ERROR DE SISTEMA: " + error.message;
                msg.className = "msg-err";
                msg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "FIRMAR Y EMITIR IDENTIDAD";
            }
        };
    </script>
</body>
</html>
